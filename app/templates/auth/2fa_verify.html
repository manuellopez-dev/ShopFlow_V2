<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación 2FA — ShopFlow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card" style="text-align:center;">

    <div class="auth-logo">
      <div style="font-size:3rem; margin-bottom:0.75rem;">🔐</div>
      <h1>Shop<span>Flow</span></h1>
      <p>Verificación en dos pasos</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="alerts">
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">
      Ingresa el código de 6 dígitos de tu app Google Authenticator
    </p>

    <form method="POST">
      <div class="form-group">
        <input type="text" name="code" required placeholder="000000" maxlength="6"
               autofocus style="text-align:center; font-size:1.8rem; letter-spacing:10px; font-weight:600;">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Verificar código
      </button>
    </form>

  </div>
</div>

</body>
</html>
