{% extends "base.html" %}
{% block title %}Recuperar Contraseña — ShopFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <h1>Shop<span>Flow</span></h1>
      <p>Recupera tu contraseña</p>
    </div>
    <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:1.5rem;">
      Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
    </p>
    <form method="POST" novalidate>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" required placeholder="tu@correo.com" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Enviar enlace
      </button>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>
{% endblock %}
