{% extends "base.html" %}
{% block title %}Iniciar Sesión — ShopFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <h1>Shop<span>Flow</span></h1>
      <p>Bienvenido de vuelta</p>
    </div>

    <form method="POST" novalidate>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" required placeholder="tu@correo.com" autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Iniciar sesión
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('auth.forgot_password') }}">¿Olvidaste tu contraseña?</a>
      <div class="divider"></div>
      ¿No tienes cuenta?
      <a href="{{ url_for('auth.register') }}">Regístrate gratis</a>
    </div>
  </div>
</div>
{% endblock %}
