{% extends "base.html" %}
{% block title %}{{ 'Editar' if user else 'Nuevo' }} Usuario — ShopFlow{% endblock %}

{% block content %}
<div style="max-width:520px; margin:0 auto;">
  <div class="page-header">
    <h1>{{ 'Editar' if user else 'Nuevo' }} Usuario</h1>
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline btn-sm">← Volver</a>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" name="name" required value="{{ user.name if user else '' }}">
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" required value="{{ user.email if user else '' }}">
      </div>
      <div class="form-group">
        <label>Contraseña {% if user %}(dejar vacío para no cambiar){% endif %}</label>
        <input type="password" name="password" {% if not user %}required{% endif %} minlength="8">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select name="role">
          {% for r in roles %}
            <option value="{{ r }}" {{ 'selected' if user and user.role == r }}>
              {{ r.capitalize() }}
            </option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Guardar usuario</button>
    </form>
  </div>
</div>
{% endblock %}
