{% extends "base.html" %}
{% block title %}Nuevo Cupón — ShopFlow{% endblock %}

{% block content %}
<div style="max-width:500px; margin:0 auto;">
  <div class="page-header">
    <h1>Nuevo Cupón</h1>
    <a href="{{ url_for('coupons.list_coupons') }}" class="btn btn-outline btn-sm">← Volver</a>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Código</label>
        <input type="text" name="code" required placeholder="Ej. DESCUENTO20" autofocus
               style="text-transform:uppercase; letter-spacing:2px;">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label>Tipo de descuento</label>
          <select name="discount_type">
            <option value="percent">Porcentaje (%)</option>
            <option value="fixed">Monto fijo ($)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Valor del descuento</label>
          <input type="number" name="discount_value" required min="1" step="0.01" placeholder="20">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label>Compra mínima ($)</label>
          <input type="number" name="min_order" min="0" step="0.01" value="0">
        </div>
        <div class="form-group">
          <label>Máximo de usos</label>
          <input type="number" name="max_uses" min="1" value="100">
        </div>
      </div>
      <div class="form-group">
        <label>Fecha de expiración (opcional)</label>
        <input type="datetime-local" name="expires_at">
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Crear cupón</button>
    </form>
  </div>
</div>
{% endblock %}
