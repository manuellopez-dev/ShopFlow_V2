{% extends "base.html" %}
{% block title %}Nueva Categoría — ShopFlow{% endblock %}

{% block content %}
<div style="max-width:480px; margin:0 auto;">
  <div class="page-header">
    <h1>Nueva Categoría</h1>
    <a href="{{ url_for('admin.categories') }}" class="btn btn-outline btn-sm">← Volver</a>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="name" required
               value="{{ category.name if category else '' }}" autofocus>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea name="description" rows="3"
                  placeholder="Descripción opcional...">{{ category.description if category else '' }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Guardar categoría</button>
    </form>
  </div>
</div>
{% endblock %}
